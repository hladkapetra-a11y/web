<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a2472" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" result="t" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="t" mode="overlay" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g fill="rgba(255,255,255,0.06)" transform="translate(80,60)">
    <!-- decorative abstract shapes to suggest a map texture -->
    <circle cx="300" cy="200" r="120" fill="#ffffff" opacity="0.03" />
    <circle cx="520" cy="300" r="90" fill="#ffffff" opacity="0.03" />
    <ellipse cx="900" cy="220" rx="260" ry="120" fill="#ffffff" opacity="0.02" />
    <ellipse cx="1200" cy="380" rx="200" ry="80" fill="#ffffff" opacity="0.02" />
  </g>
  <text x="50%" y="50%" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" opacity="0.92" dy="16">Mapa Evropy — placeholder</text>
  <text x="50%" y="58%" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" opacity="0.9">Nahraďte prosím skutečnou mapou (images/europe-map.svg)</text>
</svg>
